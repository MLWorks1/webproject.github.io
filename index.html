<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>ML & Deep</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      font-family: "Segoe UI", Tahoma, sans-serif;
      overflow: hidden;
      color: #fff;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ===== Mouse Light ===== */
    .light {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,0.6), transparent 75%);
      pointer-events: none;
      filter: blur(50px);
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    /* ===== Container ===== */
    .container {
      display: flex;
      gap: 60px;
      z-index: 2;
    }

    /* ===== Card ===== */
    .card {
      width: 260px;
      height: 320px;
      border-radius: 30px;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-decoration: none;
      color: #fff;
      transition: all 0.45s ease;
      position: relative;
      overflow: hidden;
    }

    /* Glow border */
    .card::before {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 30px;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .card:hover::before {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-20px) scale(1.08);
      box-shadow: 0 0 60px rgba(255,255,255,0.35);
    }

    .title {
      font-size: 48px;
      font-weight: 800;
      letter-spacing: 3px;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      opacity: 0.85;
      letter-spacing: 1px;
    }

    /* Different glow colors */
    .ml:hover {
      box-shadow: 0 0 60px rgba(0, 255, 255, 0.6);
    }

    .deep:hover {
      box-shadow: 0 0 60px rgba(255, 0, 150, 0.6);
    }
  </style>
</head>

<body>

  <div class="light" id="light"></div>

  <div class="container">
    <a href="ml.html" class="card ml">
      <div class="title">ML</div>
      <div class="subtitle">Machine Learning</div>
    </a>

    <a href="deep.html" class="card deep">
      <div class="title">DEEP</div>
      <div class="subtitle">Deep Learning</div>
    </a>
  </div>
